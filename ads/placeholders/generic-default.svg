<svg width="300" height="600" viewBox="0 0 300 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="600" fill="#ffffff"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="299" height="599" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Inner hairline accent frame -->
  <rect x="12" y="12" width="276" height="576" fill="none" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Abstract data node icon (upper-middle area) -->
  <g transform="translate(150, 180)">
    <line x1="-38" y1="10" x2="0" y2="-24" stroke="#cbd5e1" stroke-width="1.25"/>
    <line x1="0" y1="-24" x2="38" y2="10" stroke="#cbd5e1" stroke-width="1.25"/>
    <line x1="-38" y1="10" x2="38" y2="10" stroke="#cbd5e1" stroke-width="1.25"/>
    <line x1="0" y1="-24" x2="0" y2="26" stroke="#cbd5e1" stroke-width="1.25"/>

    <circle cx="-38" cy="10" r="3.5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.25"/>
    <circle cx="38" cy="10" r="3.5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.25"/>
    <circle cx="0" cy="26" r="3.5" fill="#ffffff" stroke="#94a3b8" stroke-width="1.25"/>

    <circle cx="0" cy="-24" r="7.5" fill="#1E40AF"/>
    <circle cx="0" cy="-24" r="12" fill="none" stroke="#1E40AF" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Primary text -->
  <text x="150" y="300" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F172A" letter-spacing="2.5">SPONSOR THIS</text>
  <text x="150" y="324" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F172A" letter-spacing="2.5">SLOT</text>

  <!-- Divider -->
  <line x1="130" y1="346" x2="170" y2="346" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="150" y="368" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#475569" letter-spacing="0.4">Premium Traffic &#8226; Direct Leads</text>

  <!-- CTA pill badge -->
  <g transform="translate(150, 440)">
    <rect x="-72" y="-18" width="144" height="36" rx="18" fill="#ffffff" stroke="#1E40AF" stroke-width="1.25"/>
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1E40AF" letter-spacing="0.6">Advertise Here</text>
  </g>

  <!-- Bottom micro-label -->
  <text x="150" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" font-weight="500" fill="#cbd5e1" letter-spacing="2.5">AD SPACE</text>
</svg>
