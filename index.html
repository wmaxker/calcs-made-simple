<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- METHOD 1 SEO: Pass authority up to home domain from inside embedded blocks -->
    <meta name="robots" content="indexifembedded" />

    <meta name="description" content="Free ROI calculators and interactive browser games." />
    <link rel="preconnect" href="https://googleapis.com" />

    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
        }
        html { 
            font-size: 18px; 
            font-family: 'Inter', sans-serif; 
        }
        body { 
            background-color: #E8F4F1; 
            margin: 0; 
            min-height: 100vh; 
        }
        .btn-nav { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 0.65rem 0.85rem; 
            background: #4DB6AC; 
            color: #fff; 
            font-weight: 600; 
            font-size: 0.85rem; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            box-shadow: inset 0px 2px 0px rgba(255, 255, 255, 0.45), inset 1px 1px 0px rgba(255, 255, 255, 0.2), 0px 4px 0px #2e7d75, 0px 6px 10px rgba(15, 23, 42, 0.15); 
            transition: filter 0.18s ease, transform 0.1s ease, box-shadow 0.1s ease; 
            text-align: center; 
            line-height: 1.25; 
            letter-spacing: 0.01em; 
            user-select: none; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            min-width: 0; 
            box-sizing: border-box; 
        }
        .btn-nav:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.05); 
            box-shadow: inset 0px 2px 0px rgba(255, 255, 255, 0.55), inset 1px 1px 0px rgba(255, 255, 255, 0.3), 0px 6px 0px #2e7d75, 0px 8px 14px rgba(15, 23, 42, 0.18); 
        }
        .btn-nav:active { 
            transform: translateY(3px); 
            box-shadow: inset 0px 4px 8px rgba(0, 0, 0, 0.25), 0px 1px 0px rgba(255, 255, 255, 0.2); 
        }
        .btn-nav.active { 
            transform: translateY(3px); 
            background: #26A69A; 
            box-shadow: inset 0px 4px 8px rgba(0, 0, 0, 0.25), 0px 1px 0px rgba(255, 255, 255, 0.2); 
        }
        .category-label { 
            font-size: 0.68rem; 
            font-weight: 800; 
            letter-spacing: 0.13em; 
            text-transform: uppercase; 
            color: #7a9e99; 
            padding: 0 0.2rem; 
            margin-top: 0.55rem; 
            margin-bottom: 0.35rem; 
        }
        #app-viewport { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            flex: 1 1 auto; 
        }
        .ad-placeholder { 
            background: #d4ece7; 
            border: 2px dashed #a8d5cb; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #7aa8a2; 
            font-size: 0.7rem; 
            font-weight: 600; 
            letter-spacing: 0.06em; 
            text-transform: uppercase; 
            gap: 7px; 
        }
        .layout-grid { 
            display: flex; 
            gap: 1.2rem; 
            align-items: flex-start; 
        }
        .ads-col { 
            width: 164px; 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }
        .sidebar { 
            width: 215px; 
            flex-shrink: 0; 
            background: #fff; 
            border-radius: 16px; 
            padding: 1.1rem 0.85rem; 
            box-shadow: 0 2px 14px rgba(0,0,0,0.07); 
        }
        .main-content-card { 
            background: #fff; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 2px 14px rgba(0,0,0,0.07); 
            height: 640px; 
            display: flex; 
            flex-direction: column; 
        }
        @media (max-width: 960px) { 
            .layout-grid { flex-wrap: wrap; } 
            .sidebar { width: 100%; order: 1; } 
            #sidebar-inner { flex-direction: row !important; flex-wrap: wrap !important; gap: 0.5rem !important; } 
            .category-label { width: 100%; margin-top: 0.3rem; } 
            .btn-nav { width: auto !important; min-width: 130px; flex: 1 1 130px; } 
            .main-content-card { order: 2; width: 100%; height: 460px; } 
            .ads-col { order: 3; width: 100%; flex-direction: row; justify-content: center; flex-wrap: wrap; } 
            .ad-placeholder { width: 300px !important; height: 160px !important; } 
        }
        @media (max-width: 580px) { 
            .page-title { font-size: 2rem !important; } 
            .main-content-card { height: 380px; } 
        }
    </style>
</head>
<body>
<div style="max-width:1280px; margin:0 auto; padding: 1.4rem 1.2rem 0;">
    <!-- HEADER -->
    <header style="text-align:center; padding: 1.5rem 0 1rem;">
        <h1 class="page-title" style="font-size:2.75rem; font-weight:900; margin:0; line-height:1.1; letter-spacing:-0.02em; text-shadow: -0.5px -1px 0px rgba(255,255,255,0.95), 0px 1.5px 2px rgba(15,23,42,0.18);">
            <span style="color:#1a202c;">Calcs</span><span style="color:#475569; font-weight:300;"> &amp; Games</span>
        </h1>
        <p style="margin:0.42rem 0 0; font-size:0.92rem; color:#6a9490; font-weight:400; letter-spacing:0.01em;">
            Free ROI calculators and interactive browser games.
        </p>
    </header>

    <!-- LAYOUT -->
    <div class="layout-grid" style="padding-bottom:1.4rem;">
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <div id="sidebar-inner" style="display:flex; flex-direction:column; gap:0.42rem;"></div>
        </aside>

        <!-- CENTER PANEL -->
        <main style="flex:1 1 0%; min-width:0;">
            <div class="main-content-card">
                <div id="welcome-container" style="height:100%; display:flex; flex-direction:column;"></div>
                <iframe id="app-viewport" src="about:blank" style="display:none; flex:1 1 auto;"></iframe>
            </div>
            
            <!-- METHOD 2 SEO: Under-the-hood repository indexing directory -->
            <noscript>
                <div style="display:none;" aria-hidden="true">
                    <h2>Free Calculators and Browser Games — Tool Directory</h2>
                    <ul>
                        <li><strong>ROI Calculator</strong> — Calculate return on investment instantly. Enter your costs and revenue to measure profitability and make smarter financial decisions.</li>
                        <li><strong>Mortgage Calculator</strong> — Estimate your monthly mortgage repayments based on loan amount, interest rate, and term length. Plan your home purchase with confidence.</li>
                        <li><strong>Loan Repayment</strong> — Break down any personal or business loan into a clear repayment schedule showing principal, interest, and total cost over time.</li>
                        <li><strong>Word Puzzle</strong> — A free interactive browser word puzzle game. Test your vocabulary and spelling skills directly in your browser with no download required.</li>
                        <li><strong>Number Dash</strong> — A fast-paced free browser number game. Challenge your mental arithmetic and reaction speed in this addictive in-browser mini game.</li>
                        <li><strong>Memory Match</strong> — A classic free memory card matching game playable in any browser. Train your short-term memory and pattern recognition with every round.</li>
                    </ul>
                </div>
            </noscript>
        </main>

        <!-- RIGHT ADS -->
        <aside class="ads-col">
            <div class="ad-placeholder" style="width:164px; height:300px;">
                <svg width="26" height="26" fill="none" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="#a8d5cb" stroke-width="1.5"/>
                    <path d="M8 12h8M12 8v8" stroke="#a8d5cb" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Ad 300×600</span>
            </div>
            <div class="ad-placeholder" style="width:164px; height:300px;">
                <svg width="26" height="26" fill="none" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="#a8d5cb" stroke-width="1.5"/>
                    <path d="M8 12h8M12 8v8" stroke="#a8d5cb" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Ad 300×600</span>
            </div>
        </aside>
    </div>

    <!-- FOOTER -->
    <footer style="border-top:1.5px solid #c8e4de; padding:1.1rem 0.2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.6rem; margin-bottom:1rem;">
        <nav style="display:flex; gap:1.5rem; flex-wrap:wrap;">
            <a href="#" style="font-size:0.8rem; color:#5a8580; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#26A69A'" onmouseout="this.style.color='#5a8580'">Contact Us</a>
            <a href="#" style="font-size:0.8rem; color:#5a8580; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#26A69A'" onmouseout="this.style.color='#5a8580'">About Us</a>
            <a href="#" style="font-size:0.8rem; color:#5a8580; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#26A69A'" onmouseout="this.style.color='#5a8580'">Privacy Policy</a>
            <a href="#" style="font-size:0.8rem; color:#5a8580; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#26A69A'" onmouseout="this.style.color='#5a8580'">Terms of Service</a>
        </nav>
        <span style="font-size:0.76rem; color:#9bbfba; font-weight:400;">&copy; 2025 CalcsAndGames.com. All rights reserved.</span>
    </footer>
</div>

<script>
    const APP_CONFIG = [
        { category: "CALCULATORS", items: [
            { label: "ROI Calculator", slug: "roi-calculator" },
            { label: "Mortgage Calculator", slug: "mortgage-calculator" },
            { label: "Loan Repayment", slug: "loan-repayment" }
        ]},
        { category: "GAMES", items: [
            { label: "Word Puzzle", slug: "word-puzzle" },
            { label: "Number Dash", slug: "number-dash" },
            { label: "Memory Match", slug: "memory-match" }
        ]}
    ];

    let activeSlug = null;

    function buildSidebar() {
        const el = document.getElementById('sidebar-inner');
        el.innerHTML = '';
        APP_CONFIG.forEach(group => {
            const lbl = document.createElement('div');
            lbl.className = 'category-label';
            lbl.textContent = group.category;
            el.appendChild(lbl);
            group.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btn-nav';
                btn.id = 'btn-' + item.slug;
                btn.textContent = item.label;
                btn.addEventListener('click', () => loadApp(item.slug));
                el.appendChild(btn);
            });
        });
    }

    function loadApp(slug) {
        activeSlug = slug;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('btn-' + slug);
        if (btn) btn.classList.add('active');
        document.getElementById('welcome-container').style.display = 'none';
        const iframe = document.getElementById('app-viewport');
        iframe.style.display = 'block';
        iframe.src = slug + '.html';
        const url = new URL(window.location.href);
        url.searchParams.set('app', slug);
        history.pushState({ slug }, '', url.toString());
    }

    function showWelcome() {
        activeSlug = null;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const iframe = document.getElementById('app-viewport');
        iframe.style.display = 'none';
        iframe.src = 'about:blank';
        const wc = document.getElementById('welcome-container');
        wc.style.display = 'flex';
        wc.style.flexDirection = 'column';
        wc.style.height = '100%';
        wc.innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:2rem;">
                <h2 style="font-size:1.6rem;font-weight:800;color:#1e3a38;margin:0 0 0.65rem;">Welcome to Calcs &amp; Games</h2>
                <p style="font-size:0.95rem;color:#7aa8a2;font-weight:400;margin:0;line-height:1.7;">Pick a tool from the sidebar to begin.</p>
            </div>`;
    }

    function router() {
        const slug = new URLSearchParams(window.location.search).get('app');
        slug ? loadApp(slug) : showWelcome();
    }

    buildSidebar();
    router();
    window.addEventListener('popstate', router);
</script>
</body>
</html>
