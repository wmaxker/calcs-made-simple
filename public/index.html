
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- OPT 5: Replaced incorrect "indexifembedded" directive with production-ready crawl directive -->
    <meta name="robots" content="index, follow" />
    <title>Calcs Made Simple — Free ROI Calculators and Financial Utility Tools</title>
    <meta name="description" content="Free ROI calculators and financial utility tools." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Calcs Made Simple",
        "url": "https://calcsmadesimple.com",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html { font-size: 18px; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; margin: 0; min-height: 100vh; }
        .btn-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: #1E40AF;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: inset 0px 2px 0px rgba(255,255,255,0.45), inset 1px 1px 0px rgba(255,255,255,0.2), 0px 4px 0px #1e3a8a, 0px 6px 10px rgba(15,23,42,0.15);
            transition: filter 0.18s ease, transform 0.1s ease, box-shadow 0.1s ease;
            text-align: center;
            line-height: 1.25;
            letter-spacing: 0.01em;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            box-sizing: border-box;
        }
        .btn-nav:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: inset 0px 2px 0px rgba(255,255,255,0.55), inset 1px 1px 0px rgba(255,255,255,0.3), 0px 6px 0px #1e3a8a, 0px 8px 14px rgba(15,23,42,0.18);
        }
        .btn-nav:active {
            transform: translateY(3px);
            box-shadow: inset 0px 4px 8px rgba(0,0,0,0.25), 0px 1px 0px rgba(255,255,255,0.2);
        }
        .btn-nav.active {
            transform: translateY(3px);
            background: #3B82F6;
            box-shadow: inset 0px 4px 8px rgba(0,0,0,0.25), 0px 1px 0px rgba(255,255,255,0.2);
        }
        .category-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase; color: #475569; padding: 0 0.2rem; margin-top: 0.55rem; margin-bottom: 0.35rem; }
        /* OPT 2: height is now set dynamically via postMessage resize; initial auto allows natural expansion */
        #app-viewport { width: 100%; height: auto; min-height: 600px; border: none; display: block; flex: 1 1 auto; }

        /* CHANGE 2: Updated .ads-col and .ad-placeholder to support 300px width */
        .ad-placeholder { background: #eff6ff; border: 2px dashed #bfdbfe; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #3b82f6; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; gap: 7px; }
        .layout-grid { display: flex; gap: 1.2rem; align-items: flex-start; }
        .ads-col { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 1rem; }
        .sidebar { width: 215px; flex-shrink: 0; background: #fff; border-radius: 16px; padding: 1.1rem 0.85rem; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }

        /* CHANGE 4: Replaced fixed height with min-height + height: auto */
        .main-content-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.07); min-height: 640px; height: auto; display: flex; flex-direction: column; }

        @media (max-width: 960px) {
            .layout-grid { flex-wrap: wrap; }
            .sidebar { width: 100%; order: 1; }
            #sidebar-inner { flex-direction: row !important; flex-wrap: wrap !important; gap: 0.5rem !important; }
            .category-label { width: 100%; margin-top: 0.3rem; }
            .btn-nav { width: auto !important; min-width: 130px; flex: 1 1 130px; }

            /* CHANGE 4: Replaced fixed height: 460px with min-height; no fixed height */
            .main-content-card { order: 2; width: 100%; min-height: 460px; height: auto; }

            /* Ad block retains 300px width on mobile */
            .ads-col { order: 3; width: 100%; flex-direction: row; justify-content: center; flex-wrap: wrap; }
        }
        @media (max-width: 580px) {
            .page-title { font-size: 2rem !important; }

            /* CHANGE 4: Replaced fixed height: 380px with min-height */
            .main-content-card { min-height: 380px; height: auto; }
        }
    </style>
</head>
<body>
    <div style="max-width:1280px; margin:0 auto; padding: 1.4rem 1.2rem 0;">
        <!-- HEADER -->
        <header style="text-align:center; padding: 1.5rem 0 1rem;">
            <h1 class="page-title" style="font-size:2.75rem; font-weight:900; margin:0; line-height:1.1; letter-spacing:-0.02em; text-shadow: -0.5px -1px 0px rgba(255,255,255,0.95), 0px 1.5px 2px rgba(15,23,42,0.18);">
                <span style="color:#0f172a;">Calcs</span><span style="color:#475569; font-weight:300;"> Made Simple</span>
            </h1>
            <p style="margin:0.42rem 0 0; font-size:0.92rem; color:#475569; font-weight:400; letter-spacing:0.01em;">
                Free ROI calculators and financial utility tools.
            </p>
        </header>
        <!-- LAYOUT -->
        <div class="layout-grid" style="padding-bottom:1.4rem;">
            <!-- LEFT SIDEBAR -->
            <aside class="sidebar">
                <div id="sidebar-inner" style="display:flex; flex-direction:column; gap:0.42rem;"></div>
            </aside>
            <!-- CENTER PANEL -->
            <main style="flex:1 1 0%; min-width:0;">
                <div class="main-content-card">
                    <!--
                        OPT 4: Static welcome markup is now baked directly into the HTML.
                        showWelcome() and loadApp() toggle display state only — no innerHTML rebuild on each call.
                    -->
                    <div id="welcome-container" style="display:flex; flex-direction:column; height:100%;">
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:2rem;">
                            <h2 style="font-size:1.6rem;font-weight:800;color:#0f172a;margin:0 0 0.65rem;">Welcome to Calcs Made Simple</h2>
                            <p style="font-size:0.95rem;color:#475569;font-weight:600;margin:0;line-height:1.7;">Pick one of the calculator tools to get started!</p>
                        </div>
                    </div>
                    <!--
                        OPT 8: onload hook transfers keyboard focus into the iframe once content is ready,
                        supporting screen readers and Tab-key navigation users.
                    -->
                    <iframe id="app-viewport" src="about:blank" style="display:none; flex:1 1 auto;"
                        onload="this.focus();"></iframe>
                </div>
                <noscript>
                    <div style="display:none;" aria-hidden="true">
                        <h2>Free Financial Calculators and Utility Tools — Directory</h2>
                        <ul>
                            <li><strong>ROI Calculator</strong> — Calculate return on investment instantly. Enter your costs and revenue to measure profitability and make smarter financial decisions.</li>
                            <li><strong>Mortgage Calculator</strong> — Estimate your monthly mortgage repayments based on loan amount, interest rate, and term length. Plan your home purchase with confidence.</li>
                            <li><strong>Loan Repayment</strong> — Break down any personal or business loan into a clear repayment schedule showing principal, interest, and total cost over time.</li>
                            <li><strong>Streaming Cost Analysis Tool</strong> — Analyze and total your monthly streaming subscription costs to identify overspending across services.</li>
                            <li><strong>Subscription Waste Auditor</strong> — Audit recurring subscriptions and memberships to find unused services draining your monthly budget.</li>
                            <li><strong>Monthly Expense Calculator</strong> — Break down monthly household expenses by category to understand exactly where your money goes.</li>
                            <li><strong>Financial Utility Suites</strong> — A collection of free financial planning tools designed to help you budget, save, and plan with confidence.</li>
                            <li><strong>Household Budget Optimizers</strong> — Optimize your household budget by comparing income against fixed and variable expenses for better financial health.</li>
                        </ul>
                    </div>
                </noscript>
            </main>
            <!-- RIGHT ADS -->
            <!-- CHANGE 2: Merged two stacked 164x300 boxes into a single 300x600 container -->
            <aside class="ads-col">
                <div id="sidebar-ad-container" style="width:300px; height:600px; border-radius:12px; background:#f8fafc;"></div>
            </aside>
        </div>
        <!-- FOOTER -->
        <footer style="border-top:1.5px solid #e2e8f0; padding:1.1rem 0.2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.6rem; margin-bottom:1rem;">
            <nav style="display:flex; gap:1.5rem; flex-wrap:wrap;">
                <a href="?app=contact" class="footer-link" onclick="event.preventDefault(); loadApp('contact');" style="font-size:0.8rem; color:#475569; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#475569'">Contact Us</a>
                <a href="?app=about" class="footer-link" onclick="event.preventDefault(); loadApp('about');" style="font-size:0.8rem; color:#475569; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#475569'">About Us</a>
                <a href="?app=privacy" class="footer-link" onclick="event.preventDefault(); loadApp('privacy');" style="font-size:0.8rem; color:#475569; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#475569'">Privacy Policy</a>
                <a href="?app=terms" class="footer-link" onclick="event.preventDefault(); loadApp('terms');" style="font-size:0.8rem; color:#475569; font-weight:500; text-decoration:none;" onmouseover="this.style.color='#3B82F6'" onmouseout="this.style.color='#475569'">Terms of Service</a>
            </nav>
            <span style="font-size:0.76rem; color:#94a3b8; font-weight:400;">&copy; 2026 calcsmadesimple.com. All rights reserved.</span>
        </footer>
    </div>

    <script>
        /* CHANGE 1: Updated APP_CONFIG with exact labels and GitHub-matching slugs */
        const APP_CONFIG = [
            { category: "CALCULATORS", items: [
                { label: "Aircraft",    slug: "aircraft-cost-calculator" },
                { label: "Classic Car", slug: "classic-car-restoration-calculator" },
                { label: "Hobby Farm", slug: "hobby-farm-roi-calculator" }
            ]}
        ];
        let activeSlug = null;

        /* Static footer routes: slug -> { file, title, description, schemaType } */
        const STATIC_ROUTES = {
            about: {
                file: 'about-us-info.html',
                title: 'About Us | Calcs Made Simple',
                description: 'Learn about Calcs Made Simple, a free suite of niche ROI calculators and financial utility tools built to help you make smarter cost decisions.',
                schemaType: 'AboutPage'
            },
            privacy: {
                file: 'privacy-policy.html',
                title: 'Privacy Policy | Calcs Made Simple',
                description: 'Our privacy policy explains how Calcs Made Simple keeps your data 100% browser-based, with no server-side storage or tracking of your calculator inputs.',
                schemaType: 'PrivacyPolicy'
            },
            terms: {
                file: 'terms.html',
                title: 'Terms of Service | Calcs Made Simple',
                description: 'Review the terms of service for Calcs Made Simple, including our educational cost estimation disclaimers and limits of liability.',
                schemaType: 'WebPage'
            },
            contact: {
                file: 'contact-us-info.html',
                title: 'Contact Us | Calcs Made Simple',
                description: 'Get in touch with Calcs Made Simple through our encrypted, secure inbox submission form for questions, feedback, or support.',
                schemaType: 'ContactPage'
            }
        };

        /* =====================================================================
           OPT 2: postMessage iframe resize listener.
           Listens for { type: 'iframe-resize', height: <px> } from child pages
           and updates #app-viewport height to eliminate double scrollbars.

           DROP THIS SNIPPET INSIDE EACH CHILD CALCULATOR FILE to wire it up:
           -----------------------------------------------------------------------
           (function() {
               function sendHeight() {
                   window.parent.postMessage(
                       { type: 'iframe-resize', height: document.documentElement.scrollHeight },
                       '*'
                   );
               }
               window.addEventListener('load', sendHeight);
               new MutationObserver(sendHeight).observe(document.body, { subtree: true, childList: true, attributes: true });
           })();
           -----------------------------------------------------------------------
        ===================================================================== */
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'iframe-resize' && typeof event.data.height === 'number') {
                var iframe = document.getElementById('app-viewport');
                if (iframe) {
                    iframe.style.height = event.data.height + 'px';
                }
            }
        });

        function buildSidebar() {
            const el = document.getElementById('sidebar-inner');
            el.innerHTML = '';
            APP_CONFIG.forEach(group => {
                const lbl = document.createElement('div');
                lbl.className = 'category-label';
                lbl.textContent = group.category;
                el.appendChild(lbl);
                group.items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-nav';
                    btn.id = 'btn-' + item.slug;
                    btn.textContent = item.label;
                    btn.addEventListener('click', () => loadApp(item.slug));
                    el.appendChild(btn);
                });
            });
        }

        /* Updates document.title, meta description, and JSON-LD schema for static routes */
        function updateStaticRouteMetadata(routeConfig) {
            document.title = routeConfig.title;

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', routeConfig.description);

            /* Clear any previously injected static-route schema before appending the fresh node */
            const existingSchema = document.getElementById('static-route-schema');
            if (existingSchema) existingSchema.remove();

            const schemaScript = document.createElement('script');
            schemaScript.type = 'application/ld+json';
            schemaScript.id = 'static-route-schema';
            schemaScript.textContent = JSON.stringify({
                "@context": "https://schema.org",
                "@type": routeConfig.schemaType,
                "name": routeConfig.title,
                "url": window.location.href,
                "description": routeConfig.description
            });
            document.head.appendChild(schemaScript);
        }

      function loadApp(slug) {
  /*
   * OPT 3: Static route prototype-safe check via hasOwnProperty.call
   * Prevents runtime exceptions if URL tracking strings match generic object prototype properties.
   * Static footer route short-circuit: about, privacy, terms, contact.
   */
  if (Object.prototype.hasOwnProperty.call(STATIC_ROUTES, slug)) {
    const routeConfig = STATIC_ROUTES[slug];
    activeSlug = slug;

    /* OPT 4: Toggle display state only — static welcome markup stays in the DOM */
    document.getElementById('welcome-container').style.display = 'none';
    const iframe = document.getElementById('app-viewport');
    iframe.style.display = 'block';

    /*
     * OPT 6: Use location.replace() instead of direct .src assignment.
     * Prevents static page loads from polluting the browser history stack.
     */
    try {
      iframe.contentWindow.location.replace(routeConfig.file);
    } catch(e) {
      iframe.src = routeConfig.file;
    }

    /* Clear Active Nav States — no sidebar calculator should appear highlighted */
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));

    /* Monetization Compliance: reset ad container to clean homepage state */
    const adContainer = document.getElementById('sidebar-ad-container');
    if (adContainer) {
      adContainer.innerHTML = '';
    }

    /* SEO & Schema.org metadata */
    updateStaticRouteMetadata(routeConfig);

    /* History Management: only push state if the query param doesn't already match */
    const currentSlug = new URLSearchParams(window.location.search).get('app');
    if (currentSlug !== slug) {
      const url = new URL(window.location.href);
      url.searchParams.set('app', slug);
      history.pushState({ slug }, '', url.toString());
    }

    window.scrollTo({ top: 0 });
    return;
  }

  /* ── Calculator route handling (falls through from static-route short-circuit) ── */
  activeSlug = slug;
  document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + slug);
  if (btn) btn.classList.add('active');

  /* OPT 4: Toggle display state only — static welcome markup stays in the DOM */
  document.getElementById('welcome-container').style.display = 'none';
  const iframe = document.getElementById('app-viewport');
  iframe.style.display = 'block';

  /*
   * OPT 6: Use location.replace() instead of direct .src assignment.
   * Keeps the parent app's popstate router as the sole Back/Forward controller.
   */
  try {
    iframe.contentWindow.location.replace(slug + '.html');
  } catch(e) {
    iframe.src = slug + '.html';
  }

  const url = new URL(window.location.href);
  url.searchParams.set('app', slug);
  history.pushState({ slug }, '', url.toString());

  /* CHANGE 3: Hook — inject dynamic ad swap logic here (Type A / B / C per calculator) */
  if (typeof initAdEngine === 'function') {
    initAdEngine();
  }

  window.scrollTo({ top: 0 });
}

/* CHANGE 3 / OPT 4: showWelcome toggles display state only — no innerHTML rebuild */
function showWelcome() {
  activeSlug = null;
  document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
  
  /* Hide iframe, reset its location cleanly */
  const iframe = document.getElementById('app-viewport');
  iframe.style.display = 'none';
  iframe.style.height = 'auto';
  try {
    iframe.contentWindow.location.replace('about:blank');
  } catch(e) {
    iframe.src = 'about:blank';
  }
  
  /* OPT 4: Restore the pre-baked static welcome panel via display toggle only */
  const wc = document.getElementById('welcome-container');
  wc.style.display = 'flex';

  /* Force the ad container to completely clear on the homepage welcome view */
  const adContainer = document.getElementById('sidebar-ad-container');
  if (adContainer) {
    adContainer.innerHTML = '';
  }
}

function router() {
  const slug = new URLSearchParams(window.location.search).get('app');
  slug ? loadApp(slug) : showWelcome();
}

/* 
 * OPT 1: Ad engine race condition fix.
 * buildSidebar() runs immediately so the sidebar renders without delay.
 * router() is deferred to DOMContentLoaded to guarantee ads/ad-engine.js has 
 * finished parsing before initAdEngine() could be called by loadApp() on deep-linked traffic.
 */
buildSidebar();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', router);
} else {
  /* DOMContentLoaded already fired (e.g. script is deferred or page loaded fast) */
  router();
}
window.addEventListener('popstate', router);

// MASTER AUTO-SCROLL CONTROLLER: Listens for any layout change inside the frame and forces a top-scroll safety match
const observer = new MutationObserver(() => {
  const iframe = document.getElementById('app-viewport');
  if (iframe && iframe.style.height) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});
observer.observe(document.getElementById('app-viewport'), { attributes: true, attributeFilter: ['style'] });
</script>

<!-- FIXED: Loaded engine first, control second, and removed the broken relative dots -->
<script src="/ads/ad-engine.js"></script>
<script src="/ads/ad-control.js"></script>
</body>
</html>
